# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 🚀 默认代理
    - ♻️ 所有-自动
    - 🔯 香港-故转
    - 🔯 台湾-故转
    - 🔯 日本-故转
    - 🔯 新加坡-故转
    - 🔯 韩国-故转
    - 🔯 美国-故转
    - 🔯 英国-故转
    - 🔯 其他-故转
    - 直连
    - 拒绝
default_no_allmanual: &default_no_allmanual
  type: select
  proxies:
    - ♻️ 所有-自动
    - 🔯 香港-故转
    - 🔯 台湾-故转
    - 🔯 日本-故转
    - 🔯 新加坡-故转
    - 🔯 韩国-故转
    - 🔯 美国-故转
    - 🔯 英国-故转
    - 🔯 其他-故转
    - 直连
    - 拒绝

proxy-groups:

  # 业务分流组
  - {name: 🚀 默认代理, <<: *default_no_allmanual, include-all: true,filter: "^((?!(直连|拒绝)).)*$"}
#  - {name: 🚀 默认代理, <<: *default}
  - {name: 📹 YouTube, <<: *default}
  - {name: 🍀 Google, <<: *default}
  - {name: 🤖 ChatGPT, <<: *default}
  - {name: 👨🏿‍💻 GitHub, <<: *default}
  - {name: 🐬 OneDrive, <<: *default}
  - {name: 🪟 Microsoft, <<: *default}
  - {name: 🎵 TikTok, <<: *default}
  - {name: 📲 Telegram, <<: *default}
  - {name: 🎥 NETFLIX, <<: *default}
  - {name: 💶 PayPal, <<: *default}
  - {name: 🎮 GAME-CN, <<: *default}
  - { name: 国外QUIC, type: select, proxies: [🚀 默认代理,拒绝], icon: 'https://cdn.gh-proxy.com/https://raw.githubusercontent.com/echs-top/proxy/main/icon/Settings.webp' }
  - {name: 🐟 漏网之鱼, <<: *default}
  

#  - name: 🖐 所有-手动
#    type: select
#    include-all: true
#    filter: "^((?!(直连|拒绝)).)*$"

  - name: ♻️ 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(直连|拒绝)).)*$"

  # 香港组
  - name: 🔯 香港-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 🇭🇰 香港-手动
      - ♻️ 香港-自动
  
  - name: 🇭🇰 香港-手动
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    
  - name: ♻️ 香港-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
 
  # 台湾组
  - name: 🔯 台湾-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 🇹🇼 台湾-手动
      - ♻️ 台湾-自动
  - name: 🇹🇼 台湾-手动
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$"
  - name: ♻️ 台湾-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$"

  # 日本组
  - name: 🔯 日本-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 🇯🇵 日本-手动
      - ♻️ 日本-自动
  - name: 🇯🇵 日本-手动
    type: select
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: ♻️ 日本-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  # 新加坡组
  - name: 🔯 新加坡-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 🇸🇬 新加坡-手动
      - ♻️ 新加坡-自动
  - name: 🇸🇬 新加坡-手动
    type: select
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  - name: ♻️ 新加坡-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  # 韩国组
  - name: 🔯 韩国-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 🇰🇷 韩国-手动
      - ♻️ 韩国-自动
  - name: 🇰🇷 韩国-手动
    type: select
    include-all: true
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"
  - name: ♻️ 韩国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"

  # 美国组
  - name: 🔯 美国-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 🇺🇸 美国-手动
      - ♻️ 美国-自动
  - name: 🇺🇸 美国-手动
    type: select
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
  - name: ♻️ 美国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  # 英国组
