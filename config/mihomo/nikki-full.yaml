# 规则匹配
rules:
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((OR,((RULE-SET,private_domain),(RULE-SET,private_ip,no-resolve),(RULE-SET,cn_domain),(RULE-SET,cn_ip,no-resolve)))))),国外QUIC
  - OR,((RULE-SET,private_ip,no-resolve),(RULE-SET,private_domain)),直连
  - OR,((RULE-SET,tailscale),(RULE-SET,ntp_cn)),直连
#  - DOMAIN-SUFFIX,qichiyu.com,🚀 默认代理
  - RULE-SET,proxylite,🚀 默认代理
  - RULE-SET,ai,🤖 ChatGPT
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube
  - OR,((RULE-SET,google_domain),(RULE-SET,google_ip)),🍀 Google
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,tiktok_domain,🎵 TikTok
  - OR,((RULE-SET,telegram_domain),(RULE-SET,telegram_ip)),📲 Telegram
  - OR,((RULE-SET,netflix_domain),(RULE-SET,netflix_ip)),🎥 NETFLIX
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,apple_ip,直连
  - OR,((RULE-SET,steamcn),(RULE-SET,epic),(RULE-SET,gamecn)),🎮 GAME-CN
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - OR,((RULE-SET,cn_domain),(RULE-SET,cn_ip)),直连
  - MATCH,🐟 漏网之鱼

