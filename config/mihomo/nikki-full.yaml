# ========================
# Clash-ALL 优化配置
# ========================

# 机场节点订阅

proxy-providers:
  Sakuraca:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "Sakuraca-"
    exclude-filter: "x|倍|消耗|官网|到期|重置|剩余|海外"
    proxy: 直连
  SaySS:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "SaySS-"
    exclude-filter: "x|倍|消耗|官网|到期|重置|剩余|海外"
    proxy: 直连
  CockCloud:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "CockCloud-"
    exclude-filter: "x|倍|消耗|官网|到期|重置|剩余|海外"
    proxy: 直连
   

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "rule-set:cn_domain,private_domain,steamcn,epic,gamecn,fakeipfilter_domain"
  force-domain:
    - "rule-set:netflix_domain,youtube_domain"
  skip-src-address:
    - "rule-set:cn_ip,private_ip"
    
# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

#external-controller: 0.0.0.0:9090
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
#secret: "123456"

# ========================
# DNS 设置
# ========================
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain,cn_domain"
    - "geosite:cn"
    - "+.hs.net"
    - "*.lan"
  nameserver-policy:
    "rule-set:cn_domain,private_domain":
      - system
    "rule-set:geolocation-!cn":
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - system
  nameserver:
    - https://8.8.8.8/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - ::/128
      - ::1/128
      - 2001::/32
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.githubusercontent.com"
      - "+.googlevideo.com"
      - "+.msftconnecttest.com"
      - "+.msftncsi.com"



   


