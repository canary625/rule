# 订阅配置
providers: &providers { type: http, interval: 604800, proxy: LOCAL,header: { User-Agent: ['clash-verge/v2.4.3','v2rayN'] }, health-check: { enable: true, url: 'https://www.gstatic.com/generate_204', expected-status: 204,  interval: 345600, timeout: 3000, max-failed-times: 2, lazy: false }, exclude-filter: '(?i)套餐|剩余|流量|到期|重置|频道|订阅|官网|禁止|客户端|x|倍|海外|消耗|导航' }
provider-override-base: &provider_override_base
  udp: true
proxy-providers:
  Sakuraca:
    <<: *providers
    url: ""
    path: ./providers/Sakuraca.yaml
    override:
      <<: *provider_override_base
      additional-prefix: "Sakuraca |"

  SaySS:
    <<: *providers
    url: ""
    path: ./providers/SaySS.yaml
    override:
      <<: *provider_override_base
      additional-prefix: "SaySS|"

  CockCloud:
    <<: *providers
    url: ""
    path: ./providers/CockCloud.yaml
    override:
      <<: *provider_override_base
      additional-prefix: "CockCloud |"
use: &use { use: [Sakuraca,SaySS,CockCloud]}

select: &select { type: select,use: [Sakuraca,SaySS,CockCloud] }

# 全局配置 
mixed-port: 7890
ipv6: true
allow-lan: true
bind-address: '*'
mode: rule
log-level: error
unified-delay: true
tcp-concurrent: true
find-process-mode: off
global-client-fingerprint: random
disable-keep-alive: false
keep-alive-interval: 30
keep-alive-idle: 600
etag-support: true
global-ua: mihomo

# 面板
external-controller: 0.0.0.0:9090
# select: '密码'
external-ui: ui
external-ui-url: 'https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip'
# external-ui-name: zashboard
profile: { store-selected: true, store-fake-ip: true }
# experimental: { quic-go-disable-gso: true, quic-go-disable-ecn: false, dialer-ip4p-convert: false }

# geo下载链接 
geox-url:
  geosite: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
  geoip: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://gh-proxy.com/https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb
# geo-auto-update: true
# geo-update-interval: 96

# dns
hosts:
  dns.alidns.com: [223.5.5.5,223.6.6.6]# ,'2400:3200::1','2400:3200:baba::1']
  doh.pub: [120.53.53.53,1.12.12.21]
  dns.google: [8.8.8.8,8.8.4.4] # ,'2001:4860:4860::8888','2001:4860:4860::8844']
  dns.quad9.net: [9.9.9.9,149.112.112.112] #,'2620:fe::fe','2620:fe::9']
  cloudflare-dns.com: [1.1.1.1,1.0.0.1]
  services.googleapis.cn: services.googleapis.com

al: &al 'https://223.5.5.5/dns-query#LOCAL'
tx: &tx 'https://doh.pub/dns-query#LOCAL&h3=false'
gg: &gg 'https://8.8.8.8/dns-query#GDNS&ecs=8.8.8.8/32&ecs-override=true'
cf: &cf 'https://1.1.1.1/dns-query#GDNS&ecs=1.1.1.1/32&ecs-override=true'

dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: false
  enhanced-mode: redir-host
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
#  fake-ip-range: 198.18.0.1/16
#  fake-ip-range6: fdfe:dcba:9876::1/64
#  fake-ip-filter-mode: blacklist
#  fake-ip-filter:
#    - "rule-set:fakeipfilter_domain,cn_domain"
#    - "+.hs.net"
  default-nameserver: ['https://223.5.5.5/dns-query']
  proxy-server-nameserver: [*al,*tx]
  direct-nameserver: [system,*al,*tx]
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:awavenue-ads-rule": [rcode://success]
    "rule-set:proxy_list": [*gg,*cf]
    "rule-set:alibaba_domain,direct_list,private_domain,steamcn_domain,epic_domain,gamecn_domain,oppo_domain,cn_domain": [system,*al,*tx]
  nameserver: [*gg,*cf]

# 嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "rule-set:cn_domain,private_domain,steamcn_domain,epic_domain,gamecn_domain,fakeipfilter_domain"
  force-domain:
    - "rule-set:netflix_domain,youtube_domain"
  skip-src-address:
    - "rule-set:cn_ip,private_ip"

# 规则匹配
rules:
  - RULE-SET,awavenue-ads-rule,ADS
  - RULE-SET,proxy_list,GDNS
  - AND,((DST-PORT,443),(NETWORK,UDP),(RULE-SET,geolocation-!cn)),国外QUIC
  - RULE-SET,direct_list,DIRECT_LIST
#  - RULE-SET,proxylite,默认代理
  - OR,((RULE-SET,private_ip,no-resolve),(RULE-SET,private_domain),(RULE-SET,tailscale_domain),(RULE-SET,ntpcn_domain),(RULE-SET,aliasn_ip,no-resolve),(RULE-SET,alibaba_domain),(RULE-SET,oppo_domain)),LOCAL
  - RULE-SET,ai,AI
  - RULE-SET,github_domain,GitHub
  - RULE-SET,youtube_domain,YouTube
  - OR,((RULE-SET,google_domain),(RULE-SET,google_ip)),Google
  - RULE-SET,bing_domain,Bing
  - RULE-SET,onedrive_domain,OneDrive
  - RULE-SET,microsoft_domain,Microsoft
  - RULE-SET,tiktok_domain,TikTok
  - OR,((RULE-SET,telegram_domain),(RULE-SET,telegram_ip,no-resolve)),Telegram
  - OR,((RULE-SET,netflix_domain),(RULE-SET,netflix_ip,no-resolve)),NETFLIX
  - RULE-SET,paypal_domain,PayPal
  - OR,((RULE-SET,apple_ip,no-resolve),(RULE-SET,apple_domain)),LOCAL
  - OR,((RULE-SET,steamcn_domain),(RULE-SET,epic_domain),(RULE-SET,gamecn_domain)),GAME-CN
  - RULE-SET,geolocation-!cn,默认代理
  - OR,((RULE-SET,cn_domain),(RULE-SET,cn_ip)),LOCAL
  - MATCH,漏网之鱼
   
