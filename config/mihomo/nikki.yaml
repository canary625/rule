  - name: "\U0001F52F 其他-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F30F 其他-手动"
      - ♻️ 其他-自动
  - name: "\U0001F30F 其他-手动"
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝|DROP|广港|香港|HK|Hong Kong|\U0001F1ED\U0001F1F0|HongKong|广台|台湾|台灣|TW|Tai Wan|\U0001F1F9\U0001F1FC|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|\U0001F1EF\U0001F1F5|Japan|广新|新加坡|SG|坡|狮城|\U0001F1F8\U0001F1EC|Singapore|广韩|韩国|韓國|KR|首尔|春川|\U0001F1F0\U0001F1F7|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|\U0001F1FA\U0001F1F8|United States|英国|UK|United Kingdom|伦敦|英|London|\U0001F1EC\U0001F1E7)).)*$"
