    interval: 300
    filter: "^((?!(直连|拒绝|DROP|广港|香港|HK|Hong Kong|\U0001F1ED\U0001F1F0|HongKong|广台|台湾|台灣|TW|Tai Wan|\U0001F1F9\U0001F1FC|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|\U0001F1EF\U0001F1F5|Japan|广新|新加坡|SG|坡|狮城|\U0001F1F8\U0001F1EC|Singapore|广韩|韩国|韓國|KR|首尔|春川|\U0001F1F0\U0001F1F7|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|\U0001F1FA\U0001F1F8|United States|英国|UK|United Kingdom|伦敦|英|London|\U0001F1EC\U0001F1E7)).)*$"
rules:
  - "RULE-SET,proxylite,\U0001F680 默认代理"
  - OR,((RULE-SET,private_ip,no-resolve),(RULE-SET,private_domain),(RULE-SET,tailscale),(RULE-SET,ntp_cn),(RULE-SET,aliasn_ip,no-resolve),(RULE-SET,alibaba_domain),(RULE-SET,oppo_domain)),直连
  - "RULE-SET,ai,\U0001F916 ChatGPT"
  - "RULE-SET,github_domain,\U0001F468\U0001F3FF‍\U0001F4BB GitHub"
  - "RULE-SET,youtube_domain,\U0001F4F9 YouTube"
  - "OR,((RULE-SET,google_domain),(RULE-SET,google_ip)),\U0001F340 Google"
  - "RULE-SET,bing_domain,\U0001FA9F bing"
  - "RULE-SET,onedrive_domain,\U0001F42C OneDrive"
  - "RULE-SET,microsoft_domain,\U0001FA9F Microsoft"
  - "RULE-SET,tiktok_domain,\U0001F3B5 TikTok"
  - "OR,((RULE-SET,telegram_domain),(RULE-SET,telegram_ip,no-resolve)),\U0001F4F2 Telegram"
  - "OR,((RULE-SET,netflix_domain),(RULE-SET,netflix_ip,no-resolve)),\U0001F3A5 NETFLIX"
  - "RULE-SET,paypal_domain,\U0001F4B6 PayPal"
  - OR,((RULE-SET,apple_ip,no-resolve),(RULE-SET,apple_domain)),直连
  - "OR,((RULE-SET,steamcn),(RULE-SET,epic),(RULE-SET,gamecn)),\U0001F3AE GAME-CN"
  - "RULE-SET,geolocation-!cn,\U0001F680 默认代理"
  - OR,((RULE-SET,cn_domain),(RULE-SET,cn_ip)),直连
  - "MATCH,\U0001F41F 漏网之鱼"
rule-anchor:
  ip: &ip
    type: http
    interval: 345600
    behavior: ipcidr
    format: mrs
  domain: &domain
    type: http
    interval: 345600
    behavior: domain
    format: mrs
  class: &class
    type: http
    interval: 345600
    behavior: classical
    format: text
rule-providers:
  tailscale:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tailscale.mrs"
    path: ./rules/tailscale.mrs
  ntp_cn:
    <<: *domain
