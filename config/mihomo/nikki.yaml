proxy-providers:
  Sakuraca:
    url: ""
    type: http
    interval: 345600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "Sakuraca-"
    exclude-filter: "x|倍|消耗|官网|到期|重置|剩余|海外|导航"
    proxy: 直连
  SaySS:
    url: ""
    type: http
    interval: 345600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "SaySS-"
    exclude-filter: "x|倍|消耗|官网|到期|重置|剩余|海外|导航"
    proxy: 直连
  CockCloud:
    url: ""
    type: http
    interval: 345600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "CockCloud-"
    exclude-filter: "x|倍|消耗|官网|到期|重置|剩余|海外|导航"
    proxy: 直连
proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
al: &al 'https://223.5.5.5/dns-query#直连'
tx: &tx 'https://doh.pub/dns-query#直连&h3=false'
gg: &gg 'https://8.8.8.8/dns-query#RULES&ecs=8.8.8.8/32&ecs-override=true'
cf: &cf 'https://1.1.1.1/dns-query#RULES&ecs=1.1.1.1/32&ecs-override=true'
dns:
  enable: true
  cache-algorithm: arc
  listen: '[::]:1053'
  ipv6: true
  respect-rules: false
  enhanced-mode: redir-host
  default-nameserver: ['https://223.5.5.5/dns-query']
  proxy-server-nameserver: [*al, *tx]
  direct-nameserver: [system, *al, *tx]
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:proxylite": [*gg, *cf]
    "rule-set:alibaba_domain,private_domain,steamcn,epic,gamecn,oppo_domain,cn_domain": [system, *al, *tx]
  nameserver: [*gg, *cf]
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "rule-set:cn_domain,private_domain,steamcn,epic,gamecn,fakeipfilter_domain"
  force-domain:
    - "rule-set:netflix_domain,youtube_domain"
  skip-src-address:
    - "rule-set:cn_ip,private_ip"
default: &default
  type: select
  proxies:
    - "\U0001F680 默认代理"
    - ♻️ 所有-自动
    - "\U0001F52F 香港-故转"
    - "\U0001F52F 台湾-故转"
    - "\U0001F52F 日本-故转"
    - "\U0001F52F 新加坡-故转"
    - "\U0001F52F 韩国-故转"
    - "\U0001F52F 美国-故转"
    - "\U0001F52F 英国-故转"
    - "\U0001F52F 其他-故转"
    - 直连
    - 拒绝
default_no_allmanual: &default_no_allmanual
  type: select
  proxies:
    - ♻️ 所有-自动
    - "\U0001F52F 香港-故转"
    - "\U0001F52F 台湾-故转"
    - "\U0001F52F 日本-故转"
    - "\U0001F52F 新加坡-故转"
    - "\U0001F52F 韩国-故转"
    - "\U0001F52F 美国-故转"
    - "\U0001F52F 英国-故转"
    - "\U0001F52F 其他-故转"
    - 直连
    - 拒绝
proxy-groups:
  - {name: "\U0001F680 默认代理", !!merge <<: *default_no_allmanual, include-all: true, filter: "^((?!(直连|拒绝|DROP)).)*$"}
  - {name: "\U0001F4F9 YouTube", !!merge <<: *default}
  - {name: "\U0001F340 Google", !!merge <<: *default}
  - {name: "\U0001F916 ChatGPT", !!merge <<: *default}
  - {name: "\U0001F468\U0001F3FF‍\U0001F4BB GitHub", !!merge <<: *default}
  - {name: "\U0001FA9F bing", !!merge <<: *default}
  - {name: "\U0001F42C OneDrive", !!merge <<: *default}
  - {name: "\U0001FA9F Microsoft", !!merge <<: *default}
  - {name: "\U0001F3B5 TikTok", !!merge <<: *default}
  - {name: "\U0001F4F2 Telegram", !!merge <<: *default}
  - {name: "\U0001F3A5 NETFLIX", !!merge <<: *default}
  - {name: "\U0001F4B6 PayPal", !!merge <<: *default}
  - {name: "\U0001F3AE GAME-CN", !!merge <<: *default}
  - {name: "\U0001F41F 漏网之鱼", !!merge <<: *default}
  - name: ♻️ 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(直连|拒绝)).)*$"
  - name: "\U0001F52F 香港-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F1ED\U0001F1F0 香港-手动"
      - ♻️ 香港-自动
  - name: "\U0001F1ED\U0001F1F0 香港-手动"
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|\U0001F1ED\U0001F1F0|HongKong)).*$"
  - name: ♻️ 香港-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|\U0001F1ED\U0001F1F0|HongKong)).*$"
  - name: "\U0001F52F 台湾-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F1F9\U0001F1FC 台湾-手动"
      - ♻️ 台湾-自动
  - name: "\U0001F1F9\U0001F1FC 台湾-手动"
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|\U0001F1F9\U0001F1FC|TaiWan|Taiwan)).*$"
  - name: ♻️ 台湾-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|\U0001F1F9\U0001F1FC|TaiWan|Taiwan)).*$"
  - name: "\U0001F52F 日本-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F1EF\U0001F1F5 日本-手动"
      - ♻️ 日本-自动
  - name: "\U0001F1EF\U0001F1F5 日本-手动"
    type: select
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|\U0001F1EF\U0001F1F5|Japan)).*$"
  - name: ♻️ 日本-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|\U0001F1EF\U0001F1F5|Japan)).*$"
  - name: "\U0001F52F 新加坡-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F1F8\U0001F1EC 新加坡-手动"
      - ♻️ 新加坡-自动
  - name: "\U0001F1F8\U0001F1EC 新加坡-手动"
    type: select
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|\U0001F1F8\U0001F1EC|Singapore)).*$"
  - name: ♻️ 新加坡-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|\U0001F1F8\U0001F1EC|Singapore)).*$"
  - name: "\U0001F52F 韩国-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F1F0\U0001F1F7 韩国-手动"
      - ♻️ 韩国-自动
  - name: "\U0001F1F0\U0001F1F7 韩国-手动"
    type: select
    include-all: true
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|\U0001F1F0\U0001F1F7|Korea)).*$"
  - name: ♻️ 韩国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|\U0001F1F0\U0001F1F7|Korea)).*$"
  - name: "\U0001F52F 美国-故转"
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - "\U0001F1FA\U0001F1F8 美国-手动"
      - ♻️ 美国-自动
  - name: "\U0001F1FA\U0001F1F8 美国-手动"
    type: select
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|\U0001F1FA\U0001F1F8|United States)).*$"
  - name: ♻️ 美国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|\U0001F1FA\U0001F1F8|United States)).*$"
  - name: "\U0001F52F 英国-故转"
